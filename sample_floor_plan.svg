<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700"
     style="background:#ffffff; font-family: Arial, sans-serif;">

  <!-- ═══════════════════════════════════════════
       BUILDUP SAMPLE FLOOR PLAN
       공간: 팝업스토어 A동
       실제 규격: 12,000mm × 9,000mm
       축척: 1:100
  ═══════════════════════════════════════════ -->

  <defs>
    <!-- 해치 패턴 (벽체) -->
    <pattern id="wallHatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#333" stroke-width="1"/>
    </pattern>
    <!-- 치수선 화살표 -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,2 8,4 0,6" fill="#e74c3c"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <polygon points="0,2 8,4 0,6" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- ─────────────────────────────────────────
       외벽 (두께 200mm → 16px @ 1:100 × 80%)
  ───────────────────────────────────────────── -->
  <!-- 바깥 외곽 -->
  <rect x="120" y="100" width="640" height="480" fill="#cccccc" stroke="#222" stroke-width="2"/>
  <!-- 내부 공간 (벽 두께 16px 제외) -->
  <rect x="136" y="116" width="608" height="448" fill="#f5f5f0"/>

  <!-- ─────────────────────────────────────────
       내부 파티션 (임시 칸막이 — 얇은 선)
  ───────────────────────────────────────────── -->
  <!-- 없음 (오픈플로어 플랜) -->

  <!-- ─────────────────────────────────────────
       출입구 (남쪽 벽 중앙, 폭 1,800mm = 144px)
       door swing arc
  ───────────────────────────────────────────── -->
  <!-- 출입구 개구부 — 남벽 중단 절개 -->
  <rect x="336" y="564" width="144" height="16" fill="#f5f5f0"/>
  <!-- 문짝 (단순 선) -->
  <line x1="336" y1="564" x2="336" y2="548" stroke="#555" stroke-width="2"/>
  <!-- door swing arc -->
  <path d="M 336 548 A 16 16 0 0 1 352 564" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- 문 폭 표기 -->
  <line x1="336" y1="580" x2="480" y2="580" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="408" y="595" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">출입구 W=1,800</text>

  <!-- ─────────────────────────────────────────
       창문 (북쪽 벽 2개, 각 폭 1,500mm = 120px)
  ───────────────────────────────────────────── -->
  <!-- 창문 1 (왼쪽) -->
  <rect x="196" y="100" width="120" height="16" fill="#aaddff" stroke="#2980b9" stroke-width="1"/>
  <line x1="196" y1="108" x2="316" y2="108" stroke="#2980b9" stroke-width="1"/>
  <!-- 창문 2 (오른쪽) -->
  <rect x="484" y="100" width="120" height="16" fill="#aaddff" stroke="#2980b9" stroke-width="1"/>
  <line x1="484" y1="108" x2="604" y2="108" stroke="#2980b9" stroke-width="1"/>

  <!-- ─────────────────────────────────────────
       스프링클러 (천장 격자 배치, 3×2 = 6개)
       실제 간격: 3,000mm × 3,000mm
  ───────────────────────────────────────────── -->
  <!-- row1 -->
  <circle cx="243" cy="188" r="7" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="243" cy="188" r="2" fill="#e74c3c"/>
  <circle cx="456" cy="188" r="7" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="456" cy="188" r="2" fill="#e74c3c"/>
  <circle cx="669" cy="188" r="7" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="669" cy="188" r="2" fill="#e74c3c"/>
  <!-- row2 -->
  <circle cx="243" cy="428" r="7" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="243" cy="428" r="2" fill="#e74c3c"/>
  <circle cx="456" cy="428" r="7" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="456" cy="428" r="2" fill="#e74c3c"/>
  <circle cx="669" cy="428" r="7" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="669" cy="428" r="2" fill="#e74c3c"/>
  <!-- 스프링클러 범례 -->
  <circle cx="142" cy="650" r="6" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="142" cy="650" r="2" fill="#e74c3c"/>
  <text x="155" y="654" font-size="10" fill="#555">스프링클러 (천장)</text>

  <!-- ─────────────────────────────────────────
       비상구 (동쪽 벽)
  ───────────────────────────────────────────── -->
  <!-- 개구부 -->
  <rect x="744" y="276" width="16" height="96" fill="#f5f5f0"/>
  <!-- 비상구 표시 -->
  <rect x="748" y="284" width="8" height="80" fill="#27ae60" fill-opacity="0.6"/>
  <text x="790" y="318" font-size="11" fill="#27ae60" font-weight="bold" text-anchor="start">비상구</text>
  <text x="790" y="332" font-size="10" fill="#27ae60" text-anchor="start">W=900</text>
  <line x1="760" y1="276" x2="820" y2="276" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="760" y1="372" x2="820" y2="372" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ─────────────────────────────────────────
       ══ 치수선 (가로 — 남쪽) ══
       전체 폭: 12,000mm
  ───────────────────────────────────────────── -->
  <!-- 수직 기준선 -->
  <line x1="120" y1="610" x2="120" y2="600" stroke="#e74c3c" stroke-width="1"/>
  <line x1="760" y1="610" x2="760" y2="600" stroke="#e74c3c" stroke-width="1"/>
  <!-- 가로 치수선 -->
  <line x1="120" y1="605" x2="760" y2="605"
        stroke="#e74c3c" stroke-width="1.5"
        marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
  <rect x="355" y="594" width="110" height="16" fill="#ffffff"/>
  <text x="410" y="606" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">12,000mm</text>

  <!-- ─────────────────────────────────────────
       ══ 치수선 (세로 — 서쪽) ══
       전체 깊이: 9,000mm
  ───────────────────────────────────────────── -->
  <line x1="80" y1="100" x2="90" y2="100" stroke="#e74c3c" stroke-width="1"/>
  <line x1="80" y1="580" x2="90" y2="580" stroke="#e74c3c" stroke-width="1"/>
  <line x1="85" y1="100" x2="85" y2="580"
        stroke="#e74c3c" stroke-width="1.5"
        marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
  <text x="62" y="345" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold"
        transform="rotate(-90, 62, 345)">9,000mm</text>

  <!-- ─────────────────────────────────────────
       내부 세부 치수 (점선)
  ───────────────────────────────────────────── -->
  <!-- 스프링클러 간격 가로 3,000mm -->
  <line x1="243" y1="165" x2="456" y2="165" stroke="#999" stroke-width="1"
        stroke-dasharray="4,2" marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
  <text x="349" y="160" text-anchor="middle" font-size="9" fill="#888">3,000</text>
  <line x1="456" y1="165" x2="669" y2="165" stroke="#999" stroke-width="1"
        stroke-dasharray="4,2" marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
  <text x="562" y="160" text-anchor="middle" font-size="9" fill="#888">3,000</text>

  <!-- 스프링클러 간격 세로 3,000mm -->
  <line x1="710" y1="188" x2="710" y2="428" stroke="#999" stroke-width="1"
        stroke-dasharray="4,2" marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
  <text x="726" y="312" text-anchor="start" font-size="9" fill="#888">3,000</text>

  <!-- ─────────────────────────────────────────
       천장고 표기 (우하단 노트)
  ───────────────────────────────────────────── -->
  <rect x="540" y="490" width="200" height="60" fill="#fffde7" stroke="#f39c12" stroke-width="1" rx="4"/>
  <text x="550" y="508" font-size="11" fill="#e67e22" font-weight="bold">※ 천장고 (Ceiling Height)</text>
  <text x="550" y="524" font-size="11" fill="#555">마감 천장: H = 3,200mm</text>
  <text x="550" y="540" font-size="11" fill="#555">구조체 기준: H = 3,800mm</text>

  <!-- ─────────────────────────────────────────
       공간 구역 레이블 (중앙)
  ───────────────────────────────────────────── -->
  <text x="410" y="340" text-anchor="middle" font-size="22" fill="#2c3e50" fill-opacity="0.15"
        font-weight="bold" letter-spacing="4">OPEN FLOOR</text>
  <text x="410" y="365" text-anchor="middle" font-size="13" fill="#7f8c8d" fill-opacity="0.5">팝업스토어 A동</text>

  <!-- ─────────────────────────────────────────
       축척 바 및 타이틀 블록
  ───────────────────────────────────────────── -->
  <!-- 타이틀 박스 -->
  <rect x="120" y="630" width="640" height="55" fill="#2c3e50" rx="4"/>
  <!-- 축척 바 (1:100 → 100mm = 8px) -->
  <text x="140" y="649" font-size="10" fill="#ecf0f1">SCALE 1:100</text>
  <rect x="140" y="654" width="80" height="8" fill="#ecf0f1"/>
  <rect x="140" y="654" width="40" height="8" fill="#e74c3c"/>
  <text x="140" y="674" font-size="9" fill="#bdc3c7">0</text>
  <text x="178" y="674" font-size="9" fill="#bdc3c7">4,000</text>
  <text x="218" y="674" font-size="9" fill="#bdc3c7">8,000mm</text>

  <!-- 프로젝트명 -->
  <text x="410" y="652" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">
    팝업스토어 A동 — 평면도
  </text>
  <text x="410" y="669" text-anchor="middle" font-size="10" fill="#bdc3c7">
    전용면적: 108㎡ (12,000 × 9,000mm) | 벽체두께: 200mm | 도면번호: FP-001
  </text>

  <!-- 범례 (우측) -->
  <text x="680" y="649" font-size="10" fill="#ecf0f1">■ 창문 (W=1,500)</text>
  <text x="680" y="663" font-size="10" fill="#ecf0f1">▌ 비상구 (W=900)</text>
  <text x="680" y="677" font-size="10" fill="#ecf0f1">⊙ 스프링클러 @3,000간격</text>

</svg>
